# Гео-настройки фильтра релевантности. Регион вынесен сюда, чтобы не хардкодить в коде.
# Активный регион выбирается ключом REGION в .env (по умолчанию sevastopol_crimea).
# Термины даны основами (без окончаний), чтобы ловить словоформы: «Севастополь/Севастополе/…».
# Матч регистронезависимый по заголовку + тексту инфоповода.

sevastopol_crimea:
  name: "Севастополь и Крым"
  include:
    - севастопол
    - крым
    - симферопол
    - ялт
    - керч
    - балаклав
    - евпатор
    - феодос
    - бахчисара
    - джанко
    - алушт
    - саки
    - черноморск
    - инкерман
    - гурзуф
    - форос
    - херсонес
    - развожаев     # губернатор Севастополя
    - аксёнов        # глава Крыма
  # exclude — опционально: термины, которые при отсутствии include помечают «не наш регион».
  # Пока пусто; заполняется при необходимости (напр. частые чужие гео с широких лент).
  exclude: []
