# Реверс-прокси: внешний порт 80 проксируется на API во внутренней сети.
events {}

http {
    # Имя upstream'а совпадает с именем сервиса api в docker-compose.
    upstream api_backend {
        server api:8000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
